name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check backend
        run: pnpm --filter backend exec tsc --noEmit

      - name: Type-check frontend
        run: pnpm --filter frontend exec tsc --noEmit

      - name: Build backend
        run: pnpm --filter backend build

      - name: Build frontend
        run: pnpm --filter frontend build
        env:
          VITE_APP_NAME: "Digitalindian Skill Academy"
          VITE_API_BASE_URL: "https://placeholder-api.vercel.app/api"
          VITE_RAZORPAY_KEY_ID: "rzp_test_placeholder"
          VITE_CLOUDINARY_CLOUD_NAME: "placeholder"
